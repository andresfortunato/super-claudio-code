services:
  redis:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    ports:
      - "8888:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    depends_on:
      - redis

volumes:
  redis-data:
